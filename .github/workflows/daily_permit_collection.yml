name: Daily CaptiveAire Permit Collection

on:
  schedule:
    # 09:00 UTC = 4-5 AM US Eastern (adjust for your timezone / DST as needed)
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button too

permissions:
  contents: write   # required so the built-in GITHUB_TOKEN can push the commit below

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: python main.py

      - name: Build public dashboard (public/index.html)
        run: python ci_build_dashboard.py --out-dir public

      - name: Commit updated data + dashboard back to the repo
        run: |
          git config user.name "captiveaire-permit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/dedup_index.csv data/normalized/permits_normalized.csv public/ || true
          git diff --cached --quiet || git commit -m "Daily permit collection $(date -u +%Y-%m-%d)"
          # Retry push with rebase in case another run pushed in between
          # (e.g. the scheduled run and a manual workflow_dispatch racing).
          for i in 1 2 3; do
            git pull --rebase origin master && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
